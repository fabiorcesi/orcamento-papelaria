<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamento Papelaria</title>

<style>
body {
  font-family: Arial;
  background:#f4f6fb;
  padding:15px;
}

.container {
  max-width:480px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08)
}

h2 {margin-bottom:10px}

input, select {
  width:100%;
  margin-top:12px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
  box-sizing:border-box;
}

/* Ajuste específico para inputs de texto (Cliente e Projeto) */
input[type="text"] {
  height:42px;
}

button {
  margin-top:12px;
  padding:14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  width:100%;
  font-size:15px;
}

button:active {transform:scale(0.98)}

.btn-add {background:#a8d5ba}
.btn-gerar {background:#a0c4ff}
.btn-novo {background:#ffd6a5}
.btn-precos {background:#d0bdf4}
.btn-copy {background:#cdb4db}
.btn-whats {background:#b7e4c7}

.hidden {display:none}

.projeto-item {
  background:#eef3ff;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}

.projeto-acoes {
  display:flex;
  gap:10px;
  margin-top:10px;
}

.projeto-acoes button {
  flex:1;
  padding:10px;
  font-size:13px;
}

.linha-preco {
  display:flex;
  gap:10px;
  align-items:center;
  margin-top:10px;
}

.linha-preco span {flex:2}
.linha-preco input {flex:1}
</style>
</head>

<body>

<div class="container">

<h2>Orçamento Papelaria</h2>

<!-- TABELA DE PREÇOS -->
<div id="configPrecos" class="hidden">
<h3>Configuração de Preços</h3>

<div class="linha-preco"><span>Impressão Só Frente</span><input id="precoSimples" type="number"></div>
<div class="linha-preco"><span>Impressão Frente e Verso</span><input id="precoDuplex" type="number"></div>

<h4>Encadernação</h4>
<div class="linha-preco"><span>Até 50 folhas</span><input id="enc1" type="number"></div>
<div class="linha-preco"><span>51 a 100 folhas</span><input id="enc2" type="number"></div>
<div class="linha-preco"><span>101 a 200 folhas</span><input id="enc3" type="number"></div>
<div class="linha-preco"><span>201 a 400 folhas</span><input id="enc4" type="number"></div>
<div class="linha-preco"><span>Acima de 400 folhas</span><input id="enc5" type="number"></div>

<button type="button" class="btn-gerar" onclick="salvarPrecos()">Salvar Tabela</button>
</div>

<!-- ORÇAMENTO -->
<div id="orcamento">

<button type="button" class="btn-precos" onclick="abrirPrecos()">Editar Tabela de Preços</button>

<input id="cliente" placeholder="Cliente">
<input id="projeto" placeholder="Projeto">

<select id="tipoServico" onchange="mostrarCampos()">
<option value="">Tipo de Serviço</option>
<option value="1">Somente Impressão</option>
<option value="2">Somente Encadernação</option>
<option value="3">Impressão + Encadernação</option>
</select>

<select id="tipoImpressao" class="hidden">
<option value="">Tipo de Impressão</option>
<option value="simples">Só Frente</option>
<option value="duplex">Frente e Verso</option>
</select>

<input id="paginas" type="number" placeholder="Quantidade de páginas" class="hidden">

<button type="button" class="btn-add" onclick="adicionarProjeto()">Adicionar outro projeto</button>
<button type="button" class="btn-gerar" onclick="gerarOrcamento()">Gerar Orçamento</button>
<button type="button" id="btnNovo" class="btn-novo hidden" onclick="novoOrcamento()">Novo Orçamento</button>

<div id="listaProjetos"></div>
<div id="orcamentoFinal"></div>

<button type="button" id="btnCopy" class="btn-copy hidden" onclick="copiarOrcamento()">Copiar Orçamento</button>
<button type="button" id="btnWhats" class="btn-whats hidden" onclick="enviarWhatsApp()">Enviar no WhatsApp</button>

</div>
</div>

<script>
let projetos = []
let precos = JSON.parse(localStorage.getItem('precos')) || {}
let contador = parseInt(localStorage.getItem('contadorOrcamento')) || 1

function formatarNome(nome){return nome.toLowerCase().replace(/\b\w/g, l => l.toUpperCase())}
function erro(msg){alert(msg)}

function abrirPrecos(){
 document.getElementById('orcamento').classList.add('hidden')
 document.getElementById('configPrecos').classList.remove('hidden')
}

function salvarPrecos(){
 precos = {
  simples:+precoSimples.value,
  duplex:+precoDuplex.value,
  enc:[+enc1.value,+enc2.value,+enc3.value,+enc4.value,+enc5.value]
 }
 localStorage.setItem('precos', JSON.stringify(precos))
 configPrecos.classList.add('hidden')
 orcamento.classList.remove('hidden')
}

function mostrarCampos(){
 let tipo = tipoServico.value
 tipoImpressao.classList.add('hidden')
 paginas.classList.add('hidden')

 if(tipo==="1"||tipo==="3") tipoImpressao.classList.remove('hidden')
 if(tipo) paginas.classList.remove('hidden')
}

function adicionarProjeto(){
 let nome=projeto.value
 let tipo=tipoServico.value
 let imp=tipoImpressao.value
 let pag=parseInt(paginas.value)

 if(!nome||!tipo||!pag){erro('Preencha os dados do projeto');return}

 if((tipo==="1"||tipo==="3")&&!imp){
  erro('Informe o tipo de impressão')
  return
 }

 let folhas=imp==='duplex'?Math.ceil(pag/2):pag
 projetos.push({nome,tipo,imp,pag,folhas})

 atualizarLista()
 limpar()
 atualizarVisibilidade()
}

function atualizarLista(){
 listaProjetos.innerHTML=''
 projetos.forEach((p,i)=>{
  listaProjetos.innerHTML+=`\n  <div class="projeto-item">\n    <b>${p.nome}</b>\n    <div class="projeto-acoes">\n      <button onclick="editar(${i})">Editar</button>\n      <button onclick="remover(${i})">Remover</button>\n    </div>\n  </div>`
 })
}

function editar(i){
 let p=projetos[i]
 projeto.value=p.nome
 tipoServico.value=p.tipo
 mostrarCampos()
 tipoImpressao.value=p.imp
 paginas.value=p.pag
 projetos.splice(i,1)
 atualizarLista()
}

function remover(i){
 projetos.splice(i,1)
 atualizarLista()
}

function calcularEnc(f){
 if(f<=50)return precos.enc[0]
 if(f<=100)return precos.enc[1]
 if(f<=200)return precos.enc[2]
 if(f<=400)return precos.enc[3]
 return precos.enc[4]
}

function gerarOrcamento(){

 if(projeto.value && paginas.value) adicionarProjeto()

 if(projetos.length===0){
  erro('Inclua pelo menos um projeto')
  return
 }

 let codigo = contador++
 localStorage.setItem('contadorOrcamento', contador)

 let nomeCliente = formatarNome(cliente.value || 'Cliente')

 let texto=`*🧾 ORÇAMENTO Nº ${codigo}*\n`
 texto+=`*👤 Cliente: ${nomeCliente}*\n\n`

 let total=0

 projetos.forEach(p=>{
 let totalProj=0

 texto+=`*📁 ${p.nome.toUpperCase()}*\n`

 if(p.tipo==="1"||p.tipo==="3"){
  texto+=`🖨️ Impressão: ${p.pag} páginas (${p.imp==='duplex'?'frente e verso':'só frente'})\n`
  totalProj+=p.pag*(p.imp==='duplex'?precos.duplex:precos.simples)
 }

 if(p.tipo==="2"||p.tipo==="3"){
  texto+=`📘 Encadernação: ${p.folhas} folhas\n`
  totalProj+=calcularEnc(p.folhas)
 }

 texto+=`💰 *Total: R$ ${totalProj.toFixed(2)}*\n\n`

 total+=totalProj
 })

 texto+=`💵 *TOTAL GERAL: R$ ${total.toFixed(2)}*`

 orcamentoFinal.innerText=texto

 btnCopy.classList.remove('hidden')
 btnWhats.classList.remove('hidden')
 atualizarVisibilidade(true)
}

function copiarOrcamento(){
 navigator.clipboard.writeText(orcamentoFinal.innerText)
 alert('Copiado!')
}

function enviarWhatsApp(){
 let texto=encodeURIComponent(orcamentoFinal.innerText)
 window.open(`https://wa.me/?text=${texto}`)
}

function limpar(){
 projeto.value=''
 tipoServico.value=''
 tipoImpressao.value=''
 paginas.value=''
 tipoImpressao.classList.add('hidden')
 paginas.classList.add('hidden')
}

function novoOrcamento(){
 projetos=[]
 cliente.value=''
 limpar()
 listaProjetos.innerHTML=''
 orcamentoFinal.innerHTML=''
 btnCopy.classList.add('hidden')
 btnWhats.classList.add('hidden')
 atualizarVisibilidade()
}

function atualizarVisibilidade(orcamentoGerado=false){
 if(projetos.length>0||orcamentoGerado){
  btnNovo.classList.remove('hidden')
 } else {
  btnNovo.classList.add('hidden')
 }
}
</script>

</body>
</html>
