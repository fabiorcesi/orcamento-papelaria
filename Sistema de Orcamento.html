<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Orçamentos - Papelaria</title>
<style>
body{font-family:Arial;background:#f6f4fb;margin:0;padding:20px}
.container{max-width:950px;margin:auto;background:white;padding:25px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
h1{color:#6a5acd}
h2{color:#4b3c75;margin-top:25px}
label{display:block;margin-top:10px;font-weight:bold}
input,select{padding:10px;margin-top:5px;width:100%;max-width:320px;border-radius:6px;border:1px solid #ddd}
button{margin-top:15px;padding:10px 18px;border:none;border-radius:6px;background:#7c6cf0;color:white;cursor:pointer}
button.secondary{background:#9aa0ff}
button.whatsapp{background:#25D366}
button.copy{background:#4a90e2}
button.add{background:#6bc48f}
button.new{background:#ff8c42}
button:hover{opacity:0.9}
.section{margin-top:25px;padding-top:10px;border-top:1px solid #eee}
.hidden{display:none}
.headerRow{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.rangeRow{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.rangeRow input{max-width:120px}
table{width:100%;border-collapse:collapse;margin-top:20px}
th{background:#e6ddfa;padding:10px;text-align:left}
td{padding:10px;border-bottom:1px solid #eee}
.total{font-size:22px;font-weight:bold;color:#4b3c75;margin-top:20px}
.obs{background:#efe9fb;padding:10px;margin-top:20px;border-radius:5px}
.actions{margin-top:15px;display:flex;gap:10px;flex-wrap:wrap}
.numero{background:#f0ecff;padding:8px 12px;border-radius:6px;font-weight:bold;margin-bottom:10px;display:inline-block}

@media (max-width:600px){
.container{padding:18px}
h1{font-size:22px}
input,select{max-width:100%}
button{width:100%}
.actions{flex-direction:column}
}
</style>
</head>
<body>

<div class="container">

<div class="headerRow">
<h1>Sistema de Orçamentos - Papelaria</h1>
<button class="secondary" onclick="toggleConfig()">Editar Tabela de Preços</button>
</div>

<div id="configSection" class="section hidden">
<h2>Configuração de Preços</h2>

<label>Preço impressão Só Frente (por página)</label>
<input type="number" id="precoFrente" step="0.01">

<label>Preço impressão Frente e Verso (por página)</label>
<input type="number" id="precoFrenteVerso" step="0.01">

<h3>Tabela de Encadernação</h3>
<p>Defina as faixas de folhas e seus preços.</p>

<div id="rangesContainer"></div>

<button class="add" onclick="adicionarFaixa()">Adicionar Faixa</button>

<br>
<button onclick="salvarTabela()">Salvar / Atualizar Preços</button>

</div>

<div class="section">
<h2>Novo Orçamento</h2>

<label>Nome do Cliente</label>
<input type="text" id="cliente">

<label>Tipo de Serviço</label>
<select id="tipoServico" onchange="atualizarCamposServico()">
<option value="1">Somente Impressão</option>
<option value="2">Somente Encadernação</option>
<option value="3">Impressão + Encadernação</option>
</select>

<div id="blocoImpressao">
<label>Páginas para impressão</label>
<input type="number" id="paginas">

<label>Tipo de Impressão</label>
<select id="tipoImpressao">
<option value="frente">Só Frente</option>
<option value="verso">Frente e Verso</option>
</select>
</div>

<div id="blocoEncadernacao">
<label>Folhas para encadernação</label>
<input type="number" id="folhas">
</div>

<button onclick="gerarOrcamento()">Gerar Orçamento</button>

</div>

<div id="resultado" class="section"></div>

</div>

<script>

let mensagemWhatsApp=""

function obterNumeroOrcamento(){
let numero=localStorage.getItem('contadorOrcamento')

if(!numero){numero=1}
else{numero=parseInt(numero)+1}

localStorage.setItem('contadorOrcamento',numero)

return numero.toString().padStart(4,'0')
}

function toggleConfig(){
const sec=document.getElementById('configSection')
sec.classList.toggle('hidden')
carregarTabela()
}

function atualizarCamposServico(){
const tipo=document.getElementById('tipoServico').value
const blocoImpressao=document.getElementById('blocoImpressao')
const blocoEncadernacao=document.getElementById('blocoEncadernacao')

if(tipo=="1"){
blocoImpressao.style.display='block'
blocoEncadernacao.style.display='none'
}

if(tipo=="2"){
blocoImpressao.style.display='none'
blocoEncadernacao.style.display='block'
}

if(tipo=="3"){
blocoImpressao.style.display='block'
blocoEncadernacao.style.display='block'
}
}

function adicionarFaixa(limite='',preco=''){
const container=document.getElementById('rangesContainer')
const div=document.createElement('div')
div.className='rangeRow'

div.innerHTML=`
<input type="number" placeholder="Até folhas" class="limite" value="${limite}">
<input type="number" step="0.01" placeholder="Preço" class="preco" value="${preco}">
<button onclick="this.parentElement.remove()">Remover</button>
`

container.appendChild(div)
}

function salvarTabela(){
const limites=document.querySelectorAll('.limite')
const precos=document.querySelectorAll('.preco')
let encadernacao=[]

for(let i=0;i<limites.length;i++){
const limite=parseInt(limites[i].value)
const preco=parseFloat(precos[i].value)

if(!isNaN(limite)&&!isNaN(preco)){
encadernacao.push({limite,preco})
}
}

encadernacao.sort((a,b)=>a.limite-b.limite)

const tabela={
precoFrente:parseFloat(document.getElementById('precoFrente').value),
precoFrenteVerso:parseFloat(document.getElementById('precoFrenteVerso').value),
encadernacao
}

localStorage.setItem('tabelaPapelaria',JSON.stringify(tabela))
alert('Tabela de preços salva/atualizada!')
}

function carregarTabela(){
const tabela=JSON.parse(localStorage.getItem('tabelaPapelaria'))
const container=document.getElementById('rangesContainer')
container.innerHTML=''

if(!tabela){
adicionarFaixa(50,'')
adicionarFaixa(100,'')
adicionarFaixa(200,'')
adicionarFaixa(400,'')
adicionarFaixa(9999,'')
return
}

document.getElementById('precoFrente').value=tabela.precoFrente

document.getElementById('precoFrenteVerso').value=tabela.precoFrenteVerso

for(let faixa of tabela.encadernacao){
adicionarFaixa(faixa.limite,faixa.preco)
}
}

function calcularEncadernacao(folhas,tabela){
for(let faixa of tabela){
if(folhas<=faixa.limite){
return faixa.preco
}
}
return tabela[tabela.length-1].preco
}

function gerarOrcamento(){

const numero=obterNumeroOrcamento()
const tabela=JSON.parse(localStorage.getItem('tabelaPapelaria'))

if(!tabela){alert('Cadastre a tabela de preços primeiro!');return}

const cliente=document.getElementById('cliente').value || 'Cliente'
const tipo=document.getElementById('tipoServico').value
const paginas=parseInt(document.getElementById('paginas').value)||0
const folhas=parseInt(document.getElementById('folhas').value)||0
const tipoImpressao=document.getElementById('tipoImpressao').value

let valorImpressao=0
let valorEncadernacao=0

if(tipo==1||tipo==3){
if(tipoImpressao=='frente'){
valorImpressao=paginas*tabela.precoFrente
}else{
valorImpressao=paginas*tabela.precoFrenteVerso
}
}

if(tipo==2||tipo==3){
valorEncadernacao=calcularEncadernacao(folhas,tabela.encadernacao)
}

const total=valorImpressao+valorEncadernacao

mensagemWhatsApp=`Orçamento #${numero} - Papelaria\n\nCliente: ${cliente}\n`

if(valorImpressao>0){
mensagemWhatsApp+=`Impressão: ${paginas} páginas - R$ ${valorImpressao.toFixed(2)}\n`
}

if(valorEncadernacao>0){
mensagemWhatsApp+=`Encadernação: ${folhas} folhas - R$ ${valorEncadernacao.toFixed(2)}\n`
}

mensagemWhatsApp+=`\nValor Total: R$ ${total.toFixed(2)}`

let html=`
<div class='numero'>Orçamento #${numero}</div>

<h2>Orçamento</h2>

<p><b>Cliente:</b> ${cliente}</p>

<table>
<tr><th>Serviço</th><th>Quantidade</th><th>Valor</th></tr>
`

if(valorImpressao>0){
html+=`<tr><td>Impressão</td><td>${paginas} páginas</td><td>R$ ${valorImpressao.toFixed(2)}</td></tr>`
}

if(valorEncadernacao>0){
html+=`<tr><td>Encadernação</td><td>${folhas} folhas</td><td>R$ ${valorEncadernacao.toFixed(2)}</td></tr>`
}

html+=`</table>

<p class='total'>Valor Total: R$ ${total.toFixed(2)}</p>

<div class='obs'><b>Observações:</b><br>Prazo e condições podem ser ajustados.</div>

<div class="actions">
<button class='whatsapp' onclick='abrirWhatsApp()'>Enviar pelo WhatsApp</button>
<button class='copy' onclick='copiarOrcamento()'>Copiar Orçamento</button>
<button class='new' onclick='novoOrcamento()'>Gerar Novo Orçamento</button>
</div>
`


document.getElementById('resultado').innerHTML=html
}

function abrirWhatsApp(){
const url=`https://wa.me/?text=${encodeURIComponent(mensagemWhatsApp)}`
window.open(url,'_blank')
}

function copiarOrcamento(){
navigator.clipboard.writeText(mensagemWhatsApp)
alert("Orçamento copiado para a área de transferência!")
}

function novoOrcamento(){

document.getElementById('cliente').value=''
document.getElementById('paginas').value=''
document.getElementById('folhas').value=''
document.getElementById('resultado').innerHTML=''

window.scrollTo({top:0,behavior:'smooth'})

}

carregarTabela()
atualizarCamposServico()

</script>

</body>
</html>
